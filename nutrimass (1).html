const today=(new Date().getDay()+6)%7;
let S={
  tab:'tracker',day:today,
  entries:{},creatine:{},recipes:[],
  pm:{},pn:{},
  sc:{},sm:[],sr:[],ssrc:'planning',
  pad:0,pam:null,pmode:'food',psearch:'',pqty:100,psfood:null,

  ringsearch:'',
  openR:new Set(),atr:null,
};
function dk(d){const now=new Date(),dt=new Date(now);dt.setDate(now.getDate()+d-today);return dt.toISOString().slice(0,10);}
function sum(arr){return arr.reduce((a,e)=>({cal:a.cal+e.cal*e.fac,p:a.p+e.p*e.fac,f:a.f+e.f*e.fac,c:a.c+e.c*e.fac}),{cal:0,p:0,f:0,c:0});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── STORAGE ───────────────────────────────────────────────────────
function load(){
  ['entries','creatine','recipes','pm','pn','sc','sm','sr'].forEach(k=>{
    try{const v=localStorage.getItem('nm_'+k);if(v)S[k]=JSON.parse(v);}catch(e){}
  });
}
function persist(){
  ['entries','creatine','recipes','pm','pn','sc','sm','sr'].forEach(k=>{
    try{localStorage.setItem('nm_'+k,JSON.stringify(S[k]));}catch(e){}
  });
}

// ─── RENDER ────────────────────────────────────────────────────────
function r(){
  const key=dk(S.day),ents=S.entries[key]||[],tot=sum(ents),isDim=S.day===6;
  document.getElementById('calbig').textContent=Math.round(tot.cal);
  // tabs
  const tabs=['tracker','planning','recipes','courses','history'];
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',tabs[i]===S.tab));
  // day strip
  const dstrip=document.getElementById('dstrip');
  dstrip.style.display=['tracker','history'].includes(S.tab)?'flex':'none';
  if(['tracker','history'].includes(S.tab)){
    dstrip.innerHTML=DS.map((d,i)=>{
      const k=dk(i),its=S.entries[k]||[],t=sum(its),has=its.length>0,isT=i===today;
      return`<button class="db${S.day===i?' on':''}" onclick="setDay(${i})">
        <div class="dl">${d}</div>
        <div class="di">${i===6?'🛌':has?'🌿':'·'}</div>
        ${has?`<div class="dc" style="color:${S.day===i?'#9aba92':t.cal>=G.cal.min?'#4a7c59':'#8b6914'}">${Math.round(t.cal)}</div>`:''}
      </button>`;
    }).join('');
  }
  const tc=document.getElementById('tc');
  if(S.tab==='tracker') tc.innerHTML=rTracker(ents,tot,isDim,key);
  else if(S.tab==='planning') tc.innerHTML=rPlanning();
  else if(S.tab==='recipes') tc.innerHTML=rRecipes();
  else if(S.tab==='courses') tc.innerHTML=rCourses();
  else if(S.tab==='history') tc.innerHTML=rHistory();
}

function mbar(label,val,min,max,col){
  const t=max||min,pct=Math.min((val/t)*100,100),over=val>(max||min*1.1),ok=max?val>=min&&val<=max:val>=min*0.9;
  const sc=over?'#c04a3a':ok?'#4a7c59':'#8b6914',bc=over?'#c04a3a':ok?col:'#8b6914';
  return`<div class="mbw"><div class="mbh"><span class="mbl">${label}</span><span class="mbv" style="color:${sc}">${Math.round(val)}${max?` / ${min}–${max}`:` / ${min}`}</span></div><div class="mbt"><div class="mbf" style="width:${pct}%;background:${bc}"></div></div></div>`;
}
function fddrop(id,val){
  const q=val.toLowerCase(),fl=q?FDB.filter(f=>f.n.toLowerCase().includes(q)).slice(0,20):[];
  if(!fl.length)return'';
  return`<div class="dl2">${fl.map(f=>`<div class="di2" onclick="selF('${id}','${esc(f.n)}')">${esc(f.n)}<span class="dk">${f.cal}kcal</span></div>`).join('')}</div>`;
}

      const isDim=S.day===6;
      h+=`<div class="mov" onclick="S.atr=null;r()"><div class="msh2" onclick="event.stopPropagation()">
        <div style="font-weight:800;color:#2c3a2c;font-size:17px;margin-bottom:4px">Ajouter au tracker</div>
        <div style="font-size:13px;color:#b0b8a8;margin-bottom:16px">"${esc(rx.name)}" — quel repas ?</div>
        ${MN.filter((_,i)=>!(isDim&&i===4)).map((m,i)=>`<button onclick="addRT(${i})" style="display:block;width:100%;margin-bottom:8px;padding:13px;background:#f0ebe0;border:1px solid #e4ddd0;border-radius:12px;color:#2c3a2c;font-size:14px;font-weight:600;text-align:left;font-family:inherit">${MI[i]} ${m}</button>`).join('')}
        <button onclick="S.atr=null;r()" style="display:block;width:100%;margin-top:4px;padding:10px;background:none;border:none;color:#b0b8a8;font-size:13px;font-family:inherit">Annuler</button>
      </div></div>`;
    }
  }
  return h;
}

function rCourses(){
  let auto=[];
  if(S.ssrc==='planning'){
    const agg={};
    Object.values(S.pm).forEach(its=>its.forEach(it=>{if(!agg[it.n])agg[it.n]={name:it.n,qty:0};agg[it.n].qty+=it.qty;}));
    auto=Object.values(agg).map(x=>({...x,id:'a_'+x.name,auto:true}));
  } else if(S.ssrc==='recipes'){
    const agg={};
    S.recipes.filter(rx=>S.sr.includes(rx.id)).forEach(rx=>rx.ings.forEach(ig=>{if(!agg[ig.n])agg[ig.n]={name:ig.n,qty:0};agg[ig.n].qty+=ig.qty;}));
    auto=Object.values(agg).map(x=>({...x,id:'a_'+x.name,auto:true}));
  }
  const all=[...auto,...S.sm],ck=S.sc,ckc=all.filter(i=>ck[i.id]).length;
  const grp={};all.forEach(it=>{const c=gcat(it.name);if(!grp[c])grp[c]=[];grp[c].push(it);});

  let h=`<div class="card" style="padding:14px;margin-bottom:14px">
    <div class="sectt">Générer depuis</div>
    <div class="ssrc"><button class="ssb${S.ssrc==='planning'?' on':''}" onclick="setSS('planning')">📅 Planning</button><button class="ssb${S.ssrc==='recipes'?' on':''}" onclick="setSS('recipes')">🍳 Recettes</button><button class="ssb${S.ssrc==='manual'?' on':''}" onclick="setSS('manual')">✏️ Manuel</button></div>
    ${S.ssrc==='planning'?`<div style="font-size:12px;color:#b0b8a8;background:#f0ebe0;border-radius:8px;padding:8px 12px">🌿 Ingrédients de tout ton planning de la semaine</div>`:''}
    ${S.ssrc==='recipes'&&S.recipes.length===0?`<div style="text-align:center;font-size:13px;color:#b0b8a8;padding:12px">Crée d'abord des recettes 🍳</div>`:''}
    ${S.ssrc==='recipes'&&S.recipes.length>0?S.recipes.map(rx=>`<div onclick="togSR(${rx.id})" style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:${S.sr.includes(rx.id)?'#eaf2ec':'#f0ebe0'};border:1px solid ${S.sr.includes(rx.id)?'#c8dece':'#e4ddd0'};border-radius:10px;margin-bottom:6px;cursor:pointer">
      <div style="width:18px;height:18px;border-radius:5px;border:2px solid ${S.sr.includes(rx.id)?'#4a7c59':'#d0c8b8'};background:${S.sr.includes(rx.id)?'#4a7c59':'transparent'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:900;flex-shrink:0">${S.sr.includes(rx.id)?'✓':''}</div>
      <div><div style="font-size:13px;font-weight:600;color:#2c3a2c">${esc(rx.name)}</div><div style="font-size:11px;color:#b0b8a8">${rx.ings.length} ingr.</div></div>
    </div>`).join(''):''}
  </div>
  <div class="card" style="padding:14px;margin-bottom:14px">
    <div class="sectt">+ Ajouter manuellement</div>
    <div style="display:flex;gap:8px">
      <input type="text" id="smi" placeholder="Ex: Pain, Café…" style="flex:2" onkeydown="if(event.key==='Enter')addSM()"/>
      <input type="text" id="smq" placeholder="Qté" style="width:72px"/>
      <button class="btn-p" style="padding:10px 14px;font-size:18px;line-height:1" onclick="addSM()">+</button>
    </div>
  </div>`;

  if(all.length){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;color:#7a8a72"><span style="font-weight:700;color:${ckc===all.length?'#4a7c59':'#2c3a2c'}">${ckc}</span> / ${all.length} articles</div>
      ${ckc>0?`<button class="btn-s" style="font-size:12px;padding:6px 12px" onclick="clrSC()">↺ Tout décocher</button>`:''}
    </div>
    <div class="sp2"><div class="spf" style="width:${Math.round(ckc/all.length*100)}%;${ckc===all.length?'background:#4a7c59':''}"></div></div>`;
    Object.entries(grp).forEach(([cat,its])=>{
      h+=`<div class="catl">${cat}</div><div class="card" style="margin-bottom:14px">`;
      its.forEach((it,idx)=>{
        const isCk=!!ck[it.id];
        h+=`<div class="si${isCk?' ck':''}" onclick="togSI('${esc(it.id)}')">
          <div class="scb${isCk?' ck':''}">${isCk?'✓':''}</div>
          <div style="flex:1"><span class="sn${isCk?' ck':''}">${esc(it.name)}</span>${it.qty?`<span style="font-size:12px;color:#b0b8a8;margin-left:6px">${Math.round(it.qty)}g</span>`:''}</div>
          ${!it.auto?`<button style="background:none;border:none;color:#b0b8a8;font-size:16px" onclick="event.stopPropagation();delSM('${it.id}')">×</button>`:`<span style="font-size:9px;color:#b0b8a8;background:#f0ebe0;padding:2px 6px;border-radius:10px">auto</span>`}
        </div>`;
      });
      h+=`</div>`;
    });
    if(ckc===all.length) h+=`<div style="text-align:center;padding:20px;background:#eaf2ec;border-radius:16px;border:1px solid #c8dece"><div style="font-size:28px;margin-bottom:6px">🎉</div><div style="font-size:15px;font-weight:700;color:#4a7c59">Courses terminées !</div><div style="font-size:12px;color:#7a8a72;margin-top:4px">Tu as tout ce qu'il faut !</div></div>`;
  } else {
    h+=`<div class="empty"><div style="font-size:40px;margin-bottom:10px">🛒</div><div>Ta liste est vide</div><div style="font-size:12px;margin-top:6px">Génère-la depuis le planning ou tes recettes</div></div>`;
  }
  return h;
}

function rHistory(){
  let h=`<div style="font-size:13px;color:#7a8a72;margin-bottom:16px">Bilan de la semaine</div>`;
  DF.forEach((d,i)=>{
    const key=dk(i),its=S.entries[key]||[],t=sum(its),isT=i===today;
    const cok=t.cal>=G.cal.min&&t.cal<=G.cal.max,pok=t.p>=G.pr*0.9;
    h+=`<div class="hr${isT?' today':''}">
      <div>
        <div class="hdn">${d}${isT?' · aujourd\'hui':''}</div>
        ${its.length?`<div style="font-size:12px;color:#b0b8a8;margin-top:3px">P: ${Math.round(t.p)}g · L: ${Math.round(t.f)}g · G: ${Math.round(t.c)}g</div>`:''}
        <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">
          ${its.length?`<span class="tag" style="background:${cok?'#eaf2ec':'#fdf4e0'};color:${cok?'#4a7c59':'#8b6914'}">${cok?'✓ Cal':'↗ Cal'}</span><span class="tag" style="background:${pok?'#eaf2ec':'#fdf4e0'};color:${pok?'#4a7c59':'#8b6914'}">${pok?'✓ Prot':'↗ Prot'}</span>`:''}
          ${S.creatine[key]?`<span class="tag" style="background:#eaf2ec;color:#4a7c59">⚡ Créatine</span>`:''}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:900;color:${!its.length?'#b0b8a8':cok?'#4a7c59':'#8b6914'}">${!its.length?'—':Math.round(t.cal)}</div>
        ${its.length?`<div style="font-size:10px;color:#b0b8a8">kcal</div>`:''}
      </div>
    </div>`;
  });
  return h;
}

// ─── ACTIONS ───────────────────────────────────────────────────────
function go(t){S.tab=t;r();}
function setDay(i){S.day=i;r();}
function togCr(){const k=dk(S.day);S.creatine[k]=!S.creatine[k];persist();r();}
function onTS(v){S.tsearch=v;S.tsfood=null;S.tdrop=v.length>0;r();}
function selF(id,name){
  const fd=FDB.find(f=>f.n===name);
  if(id==='t'){S.tsfood=fd;S.tsearch=name;S.tdrop=false;}
  else if(id==='p'){S.psfood=fd;S.psearch=name;S.pdrop=false;addFP();}
  else if(id==='r'){S.ringsearch=name;S.rdrop=false;addRI2(fd);}
  r();
}
function addFT(){
  if(!S.tsfood)return;
  const k=dk(S.day),f=S.tsfood,qty=+document.getElementById('tqty')?.value||S.tqty||100,meal=+document.getElementById('tmeal')?.value??S.tmeal;
  if(!S.entries[k])S.entries[k]=[];
  S.entries[k].push({id:'e'+Date.now(),n:f.n,cal:f.cal,p:f.p,f:f.f,c:f.c,fac:qty/100,qty,meal});
  S.tsfood=null;S.tsearch='';S.tqty=100;S.tdrop=false;persist();r();
}
function delE(k,id){S.entries[k]=(S.entries[k]||[]).filter(e=>e.id!==id);persist();r();}
function setPD(i){S.pad=i;S.pam=null;r();}
function togPA(mi){S.pam=S.pam===mi?null:mi;S.psearch='';S.pdrop=false;r();}
function setPM2(m){S.pmode=m;r();}
function onPS(v){S.psearch=v;S.pdrop=v.length>0;r();}
function addFP(){
  const f=S.psfood;if(!f||S.pam===null)return;
  const k=`${S.pad}_${S.pam}`,qty=S.pqty||100;
  if(!S.pm[k])S.pm[k]=[];
  S.pm[k].push({id:'p'+Date.now(),n:f.n,cal:f.cal,p:f.p,f:f.f,c:f.c,fac:qty/100,qty});
  S.psearch='';S.pdrop=false;S.psfood=null;S.pam=null;persist();r();
}
function addRP(rid){
  const rx=S.recipes.find(x=>x.id===rid);if(!rx||S.pam===null)return;
  const k=`${S.pad}_${S.pam}`;if(!S.pm[k])S.pm[k]=[];
  rx.ings.forEach(ig=>S.pm[k].push({...ig,id:'p'+Date.now()+Math.random()}));
  S.pam=null;persist();r();
}
function delPI(mi,id){const k=`${S.pad}_${mi}`;S.pm[k]=(S.pm[k]||[]).filter(i=>i.id!==id);persist();r();}
function clrPM(mi){delete S.pm[`${S.pad}_${mi}`];persist();r();}
function savPN(v){S.pn[S.pad]=v;persist();}
function togR(id){if(S.openR.has(id))S.openR.delete(id);else S.openR.add(id);r();}
function openRF(){S.rf={id:null,name:'',cat:'Déjeuner',inst:'',ingqty:100,ings:[]};S.rfopen=true;S.ringsearch='';S.rdrop=false;r();}
function closeRF(){S.rfopen=false;r();}
function editR(id){const rx=S.recipes.find(x=>x.id===id);if(!rx)return;S.rf={...rx,ingqty:100,ings:rx.ings.map(i=>({...i}))};S.rfopen=true;S.ringsearch='';S.rdrop=false;r();}
function delR(id){S.recipes=S.recipes.filter(rx=>rx.id!==id);S.openR.delete(id);persist();r();}
function onRI(v){S.ringsearch=v;S.rdrop=v.length>0;r();}
function addRI2(f){if(!f)return;const qty=S.rf.ingqty||100;S.rf.ings.push({n:f.n,cal:f.cal,p:f.p,f:f.f,c:f.c,fac:qty/100,qty});S.ringsearch='';S.rdrop=false;r();}
function delRI(idx){S.rf.ings.splice(idx,1);r();}
function saveRF(){
  const f=S.rf;if(!f.name.trim()||!f.ings.length)return;
  const rx={id:f.id||Date.now(),name:f.name.trim(),cat:f.cat,inst:f.inst||'',ings:f.ings};
  if(f.id)S.recipes=S.recipes.map(x=>x.id===f.id?rx:x);else S.recipes.push(rx);
  S.rfopen=false;persist();r();
}
function showATR(rid){S.atr=rid;r();}
function addRT(meal){
  const rx=S.recipes.find(x=>x.id===S.atr);if(!rx)return;
  const k=dk(S.day);if(!S.entries[k])S.entries[k]=[];
  rx.ings.forEach(ig=>S.entries[k].push({id:'e'+Date.now()+Math.random(),n:ig.n,cal:ig.cal,p:ig.p,f:ig.f,c:ig.c,fac:ig.fac,qty:ig.qty,meal}));
  S.atr=null;persist();r();
}
function setSS(s){S.ssrc=s;r();}
function togSR(id){if(S.sr.includes(id))S.sr=S.sr.filter(x=>x!==id);else S.sr.push(id);persist();r();}
function togSI(id){S.sc[id]=!S.sc[id];persist();r();}
function clrSC(){S.sc={};persist();r();}
function addSM(){const inp=document.getElementById('smi'),qInp=document.getElementById('smq');const nm=inp?.value.trim();if(!nm)return;const qty=qInp?.value?+qInp.value:null;S.sm.push({id:'m'+Date.now(),name:nm,qty,auto:false});persist();r();}
function delSM(id){S.sm=S.sm.filter(i=>i.id!==id);persist();r();}

// ─── INIT ──────────────────────────────────────────────────────────
load();r();
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('nm_b'))
  setTimeout(()=>{document.getElementById('ibanner').style.display='block';},2500);
</script>
